<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 복습 학습 사이트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161820;
    --card: #1c1e2a;
    --card2: #222436;
    --border: #2e3150;
    --accent: #7c83f7;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --accent4: #f59e0b;
    --accent5: #f87171;
    --text: #e8eaf6;
    --text2: #9ea3c7;
    --text3: #6b7099;
    --highlight: rgba(124,131,247,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1b2e 50%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-family: 'Crimson Pro', serif; font-size: 1.7rem; color: var(--accent); letter-spacing: -0.02em; }
  .logo span { color: var(--accent3); }
  .subtitle { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
  .progress-bar { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text2); }
  .progress-fill { width: 140px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.4s; border-radius: 99px; }

  /* MAIN LAYOUT */
  .app { max-width: 1100px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 240px 1fr; gap: 28px; }

  /* SIDEBAR */
  .sidebar { position: sticky; top: 100px; height: fit-content; }
  .sidebar-section { margin-bottom: 28px; }
  .sidebar-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .passage-list { display: flex; flex-direction: column; gap: 4px; }
  .passage-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; border: 1px solid transparent;
    background: transparent; color: var(--text2); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; text-align: left; font-family: 'Noto Sans KR', sans-serif;
  }
  .passage-btn:hover { background: var(--card); color: var(--text); border-color: var(--border); }
  .passage-btn.active { background: var(--highlight); color: var(--accent); border-color: var(--accent); }
  .passage-num { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text3); min-width: 22px; }
  .passage-btn.active .passage-num { color: var(--accent); }
  .passage-done { margin-left: auto; color: var(--accent3); font-size: 0.75rem; display: none; }
  .passage-btn.done .passage-done { display: block; }

  /* MODE TABS */
  .mode-tabs { display: flex; gap: 4px; flex-direction: column; }
  .mode-tab {
    padding: 9px 12px; border-radius: 8px; border: 1px solid transparent;
    background: transparent; color: var(--text2); font-size: 0.8rem;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; gap: 8px;
  }
  .mode-tab:hover { background: var(--card); color: var(--text); }
  .mode-tab.active { background: var(--card2); color: var(--text); border-color: var(--border); }
  .mode-icon { font-size: 1rem; }

  /* MAIN CONTENT */
  .main-content { min-width: 0; }
  .passage-header {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px 28px; margin-bottom: 20px;
  }
  .passage-tag { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
  .passage-title { font-family: 'Crimson Pro', serif; font-size: 1.3rem; color: var(--text); }
  .passage-text {
    font-family: 'Crimson Pro', serif; font-size: 1.05rem; line-height: 1.85;
    color: #c8ccf0; padding: 20px 0 0; border-top: 1px solid var(--border); margin-top: 16px;
  }
  .passage-text .word-hl { cursor: pointer; border-bottom: 1px dashed var(--accent2); color: var(--accent2); transition: color 0.15s; }
  .passage-text .word-hl:hover { color: var(--accent); }

  /* STUDY PANELS */
  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* VOCAB SECTION */
  .vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .vocab-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .vocab-card::before { content:''; position:absolute; inset:0; background: var(--highlight); opacity:0; transition: opacity 0.2s; }
  .vocab-card:hover::before { opacity:1; }
  .vocab-card:hover { border-color: var(--accent); }
  .vocab-word { font-family: 'Crimson Pro', serif; font-size: 1.15rem; color: var(--accent2); font-style: italic; }
  .vocab-pos { font-size: 0.68rem; color: var(--accent3); font-family: 'JetBrains Mono', monospace; margin-left: 6px; }
  .vocab-meaning { font-size: 0.85rem; color: var(--text2); margin-top: 6px; }
  .vocab-example { font-size: 0.78rem; color: var(--text3); margin-top: 6px; font-style: italic; font-family: 'Crimson Pro', serif; }

  /* PHRASE SECTION */
  .phrase-list { display: flex; flex-direction: column; gap: 12px; }
  .phrase-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; transition: border-color 0.2s;
  }
  .phrase-card:hover { border-color: var(--accent3); }
  .phrase-en { font-family: 'Crimson Pro', serif; font-size: 1.05rem; color: var(--accent3); }
  .phrase-ko { font-size: 0.85rem; color: var(--text2); margin-top: 6px; }
  .phrase-note { font-size: 0.78rem; color: var(--text3); margin-top: 4px; }

  /* QUIZ SECTION */
  .quiz-area { display: flex; flex-direction: column; gap: 20px; }
  .quiz-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 24px;
  }
  .quiz-qnum { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text3); margin-bottom: 8px; }
  .quiz-question { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    padding: 11px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); font-size: 0.87rem;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: 'Noto Sans KR', sans-serif; display: flex; gap: 10px; align-items: flex-start;
  }
  .quiz-opt:hover { border-color: var(--accent); color: var(--text); background: var(--highlight); }
  .quiz-opt.correct { border-color: var(--accent3) !important; background: rgba(52,211,153,0.1) !important; color: var(--accent3) !important; }
  .quiz-opt.wrong { border-color: var(--accent5) !important; background: rgba(248,113,113,0.1) !important; color: var(--accent5) !important; }
  .quiz-opt.disabled { pointer-events: none; }
  .quiz-opt-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text3); min-width: 14px; padding-top: 2px; }
  .quiz-feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.83rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(52,211,153,0.1); color: var(--accent3); border: 1px solid rgba(52,211,153,0.3); }
  .quiz-feedback.bad { background: rgba(248,113,113,0.1); color: var(--accent5); border: 1px solid rgba(248,113,113,0.3); }

  /* TRANSLATION PANEL */
  .trans-area { display: flex; flex-direction: column; gap: 16px; }
  .trans-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px;
  }
  .trans-en { font-family: 'Crimson Pro', serif; font-size: 1.05rem; color: #c8ccf0; line-height: 1.75; }
  .trans-en .chunk { cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; padding: 0 1px; }
  .trans-en .chunk:hover { border-color: var(--accent4); color: var(--accent4); }
  .trans-ko { font-size: 0.88rem; color: var(--text2); line-height: 1.7; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 12px; display: none; }
  .trans-ko.visible { display: block; }
  .trans-toggle {
    margin-top: 10px; font-size: 0.78rem; color: var(--accent); cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
    border: none; background: none; font-family: 'Noto Sans KR', sans-serif;
  }
  .trans-toggle:hover { color: var(--accent2); }
  .chunk-tooltip {
    position: fixed; background: var(--card2); border: 1px solid var(--accent4);
    color: var(--accent4); font-size: 0.78rem; padding: 6px 10px; border-radius: 6px;
    pointer-events: none; display: none; z-index: 999; max-width: 200px;
  }

  /* SECTION TITLE */
  .section-title { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; font-family: 'JetBrains Mono', monospace; }

  /* WORD TOOLTIP */
  .word-tooltip {
    position: fixed; background: var(--card2); border: 1px solid var(--accent2);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-size: 0.82rem; pointer-events: none; display: none; z-index: 999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); max-width: 220px;
  }
  .word-tooltip strong { color: var(--accent2); font-family: 'Crimson Pro', serif; font-size: 1rem; }

  /* SCORE BADGE */
  .score-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 99px; font-size: 0.78rem; color: var(--text2);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 16px;
  }
  .score-badge span { color: var(--accent3); }

  /* MOBILE */
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .vocab-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">영어 복습<span> Study</span></div>
      <div class="subtitle">지필평가 대비 · 11개 지문</div>
    </div>
    <div class="progress-bar">
      <span id="score-display">0 / 22</span>
      <div class="progress-fill"><div class="progress-inner" id="progress-inner"></div></div>
    </div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">학습 모드</div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('vocab')" data-mode="vocab"><span class="mode-icon">📚</span> 단어 학습</button>
        <button class="mode-tab" onclick="setMode('phrase')" data-mode="phrase"><span class="mode-icon">🔗</span> 구문 분석</button>
        <button class="mode-tab" onclick="setMode('trans')" data-mode="trans"><span class="mode-icon">🌐</span> 해석 연습</button>
        <button class="mode-tab" onclick="setMode('quiz')" data-mode="quiz"><span class="mode-icon">✏️</span> 내용 이해</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">지문 선택</div>
      <div class="passage-list" id="passage-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="main-content">
    <!-- content injected by JS -->
  </main>
</div>

<div class="word-tooltip" id="word-tooltip"></div>
<div class="chunk-tooltip" id="chunk-tooltip"></div>

<script>
// ============================================================
// DATA
// ============================================================
const passages = [
  {
    id: 1,
    title: "티백의 비유 - 리더십과 소통",
    tag: "지문 1-2 · 유추 / 리더십",
    text: `Imagine you have the best tea in the world and you put it into a bag that's <span class="word-hl" data-word="impermeable" data-def="불투과성의 (물이 통하지 않는)">impermeable</span>. It won't work. You just won't be able to make a cup of tea. For the teabag to work, it needs to be <span class="word-hl" data-word="porous" data-def="다공성의, 구멍이 많은 (물이 통하는)">porous</span>. You need the tea and the water to come in contact with each other. In our lives too, we cannot survive and <span class="word-hl" data-word="thrive" data-def="번성하다, 잘 자라다">thrive</span> in <span class="word-hl" data-word="isolation" data-def="고립, 격리">isolation</span>. Leaders need to be careful not to build walls around themselves that prevent people from reaching out to them.`,
    vocab: [
      { word: "impermeable", pos: "adj", meaning: "불투과성의, 물이 통하지 않는", example: "an impermeable bag" },
      { word: "porous", pos: "adj", meaning: "다공성의, 구멍이 많은 (물이 통하는)", example: "a porous material" },
      { word: "thrive", pos: "v", meaning: "번성하다, 잘 성장하다", example: "thrive in cooperation" },
      { word: "isolation", pos: "n", meaning: "고립, 격리", example: "survive in isolation" },
      { word: "prevent", pos: "v", meaning: "막다, 방해하다", example: "prevent people from reaching out" },
      { word: "reach out", pos: "phr", meaning: "연락하다, 손을 내밀다", example: "reach out to them" },
    ],
    phrases: [
      { en: "come in contact with", ko: "~와 접촉하다", note: "티백 비유의 핵심 표현" },
      { en: "survive and thrive", ko: "생존하고 번성하다", note: "살아남을 뿐 아니라 잘 성장한다" },
      { en: "build walls around themselves", ko: "자신 주위에 벽을 쌓다", note: "고립·단절을 비유적으로 표현" },
      { en: "reach out to", ko: "~에게 연락하다/다가가다", note: "도움·소통을 요청하는 행동" },
    ],
    chunks: [
      { en: "Imagine you have the best tea in the world", ko: "세상에서 가장 좋은 차를 가지고 있다고 상상해보라" },
      { en: "and you put it into a bag that's impermeable.", ko: "그리고 그것을 불투과성 백에 넣는다면," },
      { en: "It won't work.", ko: "그것은 효과가 없을 것이다." },
      { en: "For the teabag to work, it needs to be porous.", ko: "티백이 작동하려면, 다공성이어야 한다." },
      { en: "In our lives too, we cannot survive and thrive in isolation.", ko: "우리의 삶에서도, 우리는 고립 속에서 생존하고 번성할 수 없다." },
      { en: "Leaders need to be careful not to build walls around themselves", ko: "리더들은 자신 주위에 벽을 쌓지 않도록 조심해야 한다" },
      { en: "that prevent people from reaching out to them.", ko: "그 벽이 사람들이 자신에게 다가오는 것을 막기 때문이다." },
    ],
    quiz: [
      {
        q: "괄호 (A), (B), (C)에서 문맥상 알맞은 낱말로 짝지어진 것은?\n(A) bag that's [impermeable / porous]\n(B) needs to be [impermeable / porous]\n(C) cannot thrive in [isolation / cooperation]",
        opts: ["impermeable - porous - isolation", "porous - impermeable - cooperation", "porous - porous - cooperation", "impermeable - porous - cooperation", "impermeable - impermeable - isolation"],
        ans: 0,
        exp: "티백이 안 되려면 물이 안 통해야(impermeable)하고, 작동하려면 다공성(porous)이어야 한다. 우리 삶도 '고립(isolation)' 속에서는 번성할 수 없다는 흐름."
      },
      {
        q: "위 글의 요지로 가장 적절한 것은?",
        opts: ["리더는 전문적인 지식을 갖추어야 한다.", "개인의 창의성은 고립된 환경에서 발휘된다.", "차의 품질은 티백의 재질보다 훨씬 중요하다.", "리더는 사람들과 소통하고 접촉할 수 있는 장벽 없는 태도를 가져야 한다.", "팀워크보다 개인의 역량이 우선시되어야 한다."],
        ans: 3,
        exp: "티백 비유를 통해, 리더도 '다공성'처럼 열린 태도로 사람들과 소통해야 한다는 메시지를 전달한다."
      }
    ]
  },
  {
    id: 2,
    title: "식당의 비유 - 꽃의 향기 광고",
    tag: "지문 3-4 · 자연 / 비유",
    text: `All of the restaurants are using carefully chosen words to <span class="word-hl" data-word="evoke" data-def="불러일으키다, 연상시키다">evoke</span> vivid mental images of delicious food and rich desserts in order to <span class="word-hl" data-word="draw" data-def="끌어들이다, 유인하다">draw</span> the potential customer to their particular <span class="word-hl" data-word="establishment" data-def="가게, 시설">establishment</span>. Just like the restaurants, nature has its own dining establishments. In a fashion similar to the restaurants' financial <span class="word-hl" data-word="dependence" data-def="의존 (independence는 오류)">dependence</span> upon drawing in many customers, the <span class="word-hl" data-word="restaurateurs" data-def="식당 주인들">restaurateurs</span> of the natural world (i.e., flowers) must also attract potential diners to sample their offerings. In the natural world, there are no neon signs or flashy words in which to market a potential meal to hungry animals. Instead of using a written language or neon sign, they advertise their offerings just as effectively using the language of smell.`,
    vocab: [
      { word: "evoke", pos: "v", meaning: "불러일으키다, 연상시키다", example: "evoke vivid mental images" },
      { word: "draw", pos: "v", meaning: "끌어들이다, 유인하다", example: "draw the customer" },
      { word: "establishment", pos: "n", meaning: "가게, 사업체, 시설", example: "dining establishment" },
      { word: "restaurateur", pos: "n", meaning: "식당 주인", example: "restaurateurs of nature = flowers" },
      { word: "sample", pos: "v", meaning: "맛보다, 시식하다", example: "sample their offerings" },
      { word: "dependence", pos: "n", meaning: "의존 (↔ independence)", example: "financial dependence on customers" },
    ],
    phrases: [
      { en: "carefully chosen words", ko: "신중하게 고른 단어들", note: "식당 메뉴판 묘사에서 사용" },
      { en: "in a fashion similar to", ko: "~와 유사한 방식으로", note: "비교 표현" },
      { en: "just as effectively", ko: "마찬가지로 효과적으로", note: "꽃도 인간 식당만큼 효과적으로 광고함" },
      { en: "the language of smell", ko: "냄새(향기)의 언어", note: "꽃이 향기로 소통하는 것을 비유" },
    ],
    chunks: [
      { en: "All of the restaurants are using carefully chosen words", ko: "모든 식당들은 신중하게 고른 단어들을 사용하고 있다" },
      { en: "to evoke vivid mental images of delicious food", ko: "맛있는 음식의 생생한 심상을 불러일으키기 위해" },
      { en: "in order to draw the potential customer to their establishment.", ko: "잠재 고객을 그들의 가게로 끌어들이기 위해." },
      { en: "Just like the restaurants, nature has its own dining establishments.", ko: "식당들과 마찬가지로, 자연도 자체적인 식당들을 가지고 있다." },
      { en: "they advertise their offerings just as effectively using the language of smell.", ko: "그들은 냄새의 언어를 사용하여 마찬가지로 효과적으로 자신의 것들을 광고한다." },
    ],
    quiz: [
      {
        q: "밑줄 친 (C)independence를 문맥상 올바른 단어로 고치면?",

      { en: "percentage point lower than", ko: "~보다 퍼센트포인트 낮은", note: "수치 비교" },
      { en: "the highest among the four countries", ko: "네 나라 중 가장 높은", note: "최상급 비교" },
    ],
    chunks: [
      { en: "Germany and India share the same proportion of credit/debit card use at 56%.", ko: "독일과 인도의 신용/직불카드 사용 비율은 56%로 동일하다." },
      { en: "The US credit/debit card use is more than twice as high as China's.", ko: "미국의 신용/직불카드 사용 비율은 중국의 두 배 이상이다." },
      { en: "China has the highest mobile payment proportion among the four countries.", ko: "중국은 네 나라 중 모바일 결제 비율이 가장 높다." },
    ],
    quiz: [
      {
        q: "도표의 내용과 일치하지 않는 문장을 고르시오.",
        opts: ["세 국가(독일, 인도, 미국)에서 현금 사용 비중이 60%를 초과했다.", "독일과 인도의 신용/직불카드 사용 비중은 56%로 동일하다.", "미국의 신용/직불카드 사용 비중은 중국의 두 배 이상이다.", "독일의 모바일 기기 결제 비중은 미국의 비중보다 3%p 낮다.", "중국은 네 국가 중 현금 사용 비중이 가장 높은 국가이다."],
        ans: 4,
        exp: "중국은 모바일 결제 비율이 가장 높은 나라이지, 현금 사용 비율이 가장 높은 나라가 아니다. ⑤가 틀렸다."
      },
      {
        q: "도표에서 중국의 특징으로 옳은 것은?",
        opts: ["현금 사용 비율이 네 나라 중 가장 높다.", "신용/직불카드 사용 비율이 56%이다.", "모바일 결제 비율이 네 나라 중 가장 높다.", "모바일 결제 비율이 독일과 동일하다.", "미국보다 현금 사용 비율이 높다."],
        ans: 2,
        exp: "중국의 특징은 모바일 결제 비율이 네 나라 중 가장 높다는 것이다."
      }
    ]
  }
];

// ============================================================
// STATE
// ============================================================
let currentPassage = 0;
let currentMode = 'vocab';
let scores = {};
let quizAnswered = {};

// ============================================================
// INIT
// ============================================================
function init() {
  renderPassageList();
  renderContent();
}

function renderPassageList() {
  const list = document.getElementById('passage-list');
  list.innerHTML = passages.map((p, i) => `
    <button class="passage-btn ${i === currentPassage ? 'active' : ''} ${scores[i] ? 'done' : ''}"
      onclick="selectPassage(${i})">
      <span class="passage-num">${String(i+1).padStart(2,'0')}</span>
      <span>${p.title.substring(0, 14)}...</span>
      <span class="passage-done">✓</span>
    </button>
  `).join('');
}

function selectPassage(i) {
  currentPassage = i;
  quizAnswered[i] = quizAnswered[i] || {};
  renderPassageList();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  renderContent();
}

// ============================================================
// RENDER
// ============================================================
function renderContent() {
  const p = passages[currentPassage];
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="passage-header">
      <div class="passage-tag">${p.tag}</div>
      <div class="passage-title">${p.title}</div>
      <div class="passage-text">${p.text}</div>
    </div>

    <div class="panel ${currentMode === 'vocab' ? 'active' : ''}" id="panel-vocab">
      <div class="section-title">📚 단어 학습</div>
      <div class="vocab-grid">
        ${p.vocab.map(v => `
          <div class="vocab-card">
            <div><span class="vocab-word">${v.word}</span><span class="vocab-pos">${v.pos}</span></div>
            <div class="vocab-meaning">${v.meaning}</div>
            <div class="vocab-example">"${v.example}"</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="panel ${currentMode === 'phrase' ? 'active' : ''}" id="panel-phrase">
      <div class="section-title">🔗 구문 분석</div>
      <div class="phrase-list">
        ${p.phrases.map(ph => `
          <div class="phrase-card">
            <div class="phrase-en">${ph.en}</div>
            <div class="phrase-ko">→ ${ph.ko}</div>
            ${ph.note ? `<div class="phrase-note">💡 ${ph.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>

    <div class="panel ${currentMode === 'trans' ? 'active' : ''}" id="panel-trans">
      <div class="section-title">🌐 해석 연습</div>
      <div class="trans-area">
        ${p.chunks.map((c, i) => `
          <div class="trans-card">
            <div class="trans-en">${c.en}</div>
            <div class="trans-ko" id="trans-ko-${currentPassage}-${i}">${c.ko}</div>
            <button class="trans-toggle" onclick="toggleTrans(${currentPassage},${i})">
              <span id="trans-arrow-${currentPassage}-${i}">▼</span> 해석 보기
            </button>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="panel ${currentMode === 'quiz' ? 'active' : ''}" id="panel-quiz">
      <div class="section-title">✏️ 내용 이해 퀴즈</div>
      <div class="score-badge">퀴즈 점수: <span id="quiz-score-badge">0</span> / ${p.quiz.length}</div>
      <div class="quiz-area">
        ${p.quiz.map((q, qi) => renderQuiz(q, qi)).join('')}
      </div>
    </div>
  `;

  // Re-attach word tooltip events
  document.querySelectorAll('.word-hl').forEach(el => {
    el.addEventListener('mouseenter', showWordTooltip);
    el.addEventListener('mouseleave', hideWordTooltip);
    el.addEventListener('mousemove', moveTooltip);
  });

  updateQuizScore();
}

function renderQuiz(q, qi) {
  const pi = currentPassage;
  const answered = quizAnswered[pi] && quizAnswered[pi][qi] !== undefined;
  const selected = answered ? quizAnswered[pi][qi] : null;
  return `
    <div class="quiz-card">
      <div class="quiz-qnum">Q${qi + 1}</div>
      <div class="quiz-question">${q.q.replace(/\n/g, '<br>')}</div>
      <div class="quiz-options">
        ${q.opts.map((opt, oi) => {
          let cls = '';
          if (answered) {
            if (oi === q.ans) cls = 'correct';
            else if (oi === selected) cls = 'wrong';
          }
          return `<button class="quiz-opt ${cls} ${answered ? 'disabled' : ''}"
            onclick="answerQuiz(${pi},${qi},${oi})">
            <span class="quiz-opt-label">${'①②③④⑤'[oi]}</span>${opt}
          </button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback ${answered ? 'show' : ''} ${answered && selected === q.ans ? 'ok' : 'bad'}" id="qfb-${pi}-${qi}">
        ${answered ? (selected === q.ans ? '✅ 정답입니다! ' : '❌ 오답입니다. ') + q.exp : ''}
      </div>
    </div>
  `;
}

function answerQuiz(pi, qi, oi) {
  if (!quizAnswered[pi]) quizAnswered[pi] = {};
  if (quizAnswered[pi][qi] !== undefined) return;
  quizAnswered[pi][qi] = oi;

  // Re-render quiz area
  const p = passages[pi];
  document.getElementById('panel-quiz').querySelector('.quiz-area').innerHTML =
    p.quiz.map((q, i) => renderQuiz(q, i)).join('');

  updateQuizScore();
  updateTotalScore();
}

function updateQuizScore() {
  const pi = currentPassage;
  const p = passages[pi];
  let s = 0;
  if (quizAnswered[pi]) {
    p.quiz.forEach((q, qi) => {
      if (quizAnswered[pi][qi] === q.ans) s++;
    });
  }
  const badge = document.getElementById('quiz-score-badge');
  if (badge) badge.textContent = s;
}

function updateTotalScore() {
  let total = 0, maxTotal = 0;
  passages.forEach((p, pi) => {
    maxTotal += p.quiz.length;
    if (quizAnswered[pi]) {
      p.quiz.forEach((q, qi) => {
        if (quizAnswered[pi][qi] === q.ans) total++;
      });
    }
  });
  document.getElementById('score-display').textContent = `${total} / ${maxTotal}`;
  document.getElementById('progress-inner').style.width = `${(total/maxTotal)*100}%`;
}

function toggleTrans(pi, i) {
  const el = document.getElementById(`trans-ko-${pi}-${i}`);
  const arrow = document.getElementById(`trans-arrow-${pi}-${i}`);
  el.classList.toggle('visible');
  arrow.textContent = el.classList.contains('visible') ? '▲' : '▼';
}

// ============================================================
// TOOLTIPS
// ============================================================
function showWordTooltip(e) {
  const tt = document.getElementById('word-tooltip');
  const word = e.target.dataset.word;
  const def = e.target.dataset.def;
  tt.innerHTML = `<strong>${word}</strong><br>${def}`;
  tt.style.display = 'block';
}
function hideWordTooltip() {
  document.getElementById('word-tooltip').style.display = 'none';
}
function moveTooltip(e) {
  const tt = document.getElementById('word-tooltip');
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
